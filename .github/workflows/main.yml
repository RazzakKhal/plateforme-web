name: Integration continue

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      production:
        description: Build the production Docker image
        required: false
        default: false
        type: boolean

jobs:
  frontend-test-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Read frontend version
        id: package_version
        run: 'echo "version=$(node -p ''require("./package.json").version'')" >> "$GITHUB_OUTPUT"'

      - name: Build and push RCT image
        if: ${{ github.event_name == 'push' || inputs.production == false }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: razzak2007/plateforme-autoecole-frontend:latest
          no-cache: true

      - name: Build and push production image
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.production == true }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: razzak2007/plateforme-autoecole-frontend:${{ steps.package_version.outputs.version }}
          no-cache: true
