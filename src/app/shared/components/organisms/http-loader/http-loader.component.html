@if (isHttpLoading()) {
  <div class="app-loader-overlay" aria-live="polite" aria-busy="true">
    <div class="app-loader-backdrop"></div>
    <div class="app-loader-glow app-loader-glow-left" aria-hidden="true"></div>
    <div class="app-loader-glow app-loader-glow-right" aria-hidden="true"></div>
    <div class="app-loader-content" role="status">
      <p class="app-loader-chip">Veuillez patienter</p>

      <div class="app-loader-visual" aria-hidden="true">
        <span class="app-loader-ring app-loader-ring-outer"></span>
        <span class="app-loader-ring app-loader-ring-inner"></span>
        <span class="app-loader-core">
          <span class="app-loader-core-dot"></span>
        </span>
      </div>

      <p class="app-loader-title">Chargement en cours</p>

      <div class="app-loader-progress" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </div>
}
